<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}نظام تحسين الإنتاج النفطي{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            direction: rtl;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #2c3e50 0%, #34495e 100%);
            color: white;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 25px 20px;
            background: rgba(0,0,0,0.2);
            border-bottom: 2px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .sidebar-header .logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 1.6em;
        }

        .sidebar-header h2 {
            font-size: 1.2em;
            margin-bottom: 5px;
        }

        .sidebar-header p {
            font-size: 0.8em;
            opacity: 0.7;
        }

        .sidebar-menu { padding: 20px 0; }

        .menu-section {
            padding: 8px 20px 4px;
            font-size: 0.7em;
            text-transform: uppercase;
            opacity: 0.5;
            letter-spacing: 1px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 14px 25px;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
            border-right: 3px solid transparent;
            gap: 12px;
        }

        .menu-item:hover {
            background: rgba(255,255,255,0.1);
            border-right-color: #667eea;
            padding-right: 30px;
        }

        .menu-item.active {
            background: rgba(102, 126, 234, 0.3);
            border-right-color: #667eea;
        }

        .menu-item i { width: 20px; font-size: 1.1em; text-align: center; }

        .sidebar-footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 15px 20px;
            background: rgba(0,0,0,0.2);
            font-size: 0.8em;
            opacity: 0.6;
            text-align: center;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-right: 280px;
            padding: 30px;
            min-height: 100vh;
        }

        .page-header {
            background: white;
            border-radius: 15px;
            padding: 25px 30px;
            margin-bottom: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .page-header-left h1 {
            font-size: 1.8em;
            color: #2c3e50;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-header-left p { color: #7f8c8d; font-size: 0.95em; }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px 30px;
            margin-bottom: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
        }

        .card h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
        }

        /* Form Elements */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 0.9em;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
            background: #fafafa;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }

        .form-group .hint {
            font-size: 0.78em;
            color: #95a5a6;
            margin-top: 4px;
        }

        /* Buttons */
        .btn {
            padding: 13px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102,126,234,0.4); }

        .btn-danger {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
        }

        /* Alerts */
        #alert-container {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 2000;
            max-width: 380px;
        }

        .alert {
            background: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            display: none;
            animation: slideIn 0.3s ease;
            font-size: 0.95em;
        }

        .alert.show { display: flex; align-items: center; gap: 10px; }
        .alert-success { border-right: 4px solid #27ae60; }
        .alert-error { border-right: 4px solid #e74c3c; }
        .alert-info { border-right: 4px solid #3498db; }

        @keyframes slideIn {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .loading.show { display: block; }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Stats Card */
        .stat-card {
            text-align: center;
            padding: 20px;
            border-radius: 12px;
            color: white;
        }

        .stat-card .stat-value {
            font-size: 2.2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-card .stat-label {
            font-size: 0.85em;
            opacity: 0.9;
        }

        /* Table */
        .table-container { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table thead tr {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        table th {
            padding: 14px 12px;
            text-align: right;
            font-weight: 600;
            font-size: 0.88em;
        }

        table td {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.9em;
            color: #2c3e50;
        }

        table tbody tr:hover { background: #fafbff; }

        /* Mobile */
        .menu-toggle {
            display: none;
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 2001;
            background: #2c3e50;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-right: 0; padding: 15px; }
            .menu-toggle { display: block; }
            .page-header { flex-direction: column; gap: 15px; }
        }

        /* Section divider */
        .section-divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
            color: #95a5a6;
            font-size: 0.85em;
        }

        .section-divider::before,
        .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e8e8e8;
        }

        /* Badge */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.78em;
            font-weight: 600;
        }

        .badge-success { background: #d5f5e3; color: #27ae60; }
        .badge-warning { background: #fef9e7; color: #f39c12; }
        .badge-danger  { background: #fdedec; color: #e74c3c; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo"><i class="fas fa-oil-can"></i></div>
            <h2>تحسين الإنتاج</h2>
            <p>OPI Production System</p>
        </div>
        <div class="sidebar-menu">
            <div class="menu-section">القائمة الرئيسية</div>
            <a href="/" class="menu-item {% if request.endpoint == 'index' %}active{% endif %}">
                <i class="fas fa-home"></i>
                <span>الصفحة الرئيسية</span>
            </a>
            <a href="/optimize" class="menu-item {% if request.endpoint == 'optimize_page' %}active{% endif %}">
                <i class="fas fa-sliders-h"></i>
                <span>تحسين الإنتاج</span>
            </a>

            <div class="menu-section">البيانات</div>
            <a href="/data" class="menu-item {% if request.endpoint == 'data_page' %}active{% endif %}">
                <i class="fas fa-database"></i>
                <span>البيانات المحفوظة</span>
            </a>
            <a href="/upload" class="menu-item {% if request.endpoint == 'upload_page' %}active{% endif %}">
                <i class="fas fa-file-excel"></i>
                <span>رفع ملف Excel</span>
            </a>

            <div class="menu-section">النموذج</div>
            <a href="/model" class="menu-item {% if request.endpoint == 'model_page' %}active{% endif %}">
                <i class="fas fa-brain"></i>
                <span>حالة النموذج</span>
            </a>
        </div>
        <div class="sidebar-footer">
            OPI Project v1.0
        </div>
    </nav>

    <!-- Main -->
    <main class="main-content">
        <button class="menu-toggle" onclick="toggleSidebar()">
            <i class="fas fa-bars"></i>
        </button>

        <div id="alert-container"></div>

        {% block content %}{% endblock %}
    </main>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        document.addEventListener('click', function(e) {
            const sidebar = document.getElementById('sidebar');
            const toggle = document.querySelector('.menu-toggle');
            if (window.innerWidth <= 768 && !sidebar.contains(e.target) && toggle && !toggle.contains(e.target)) {
                sidebar.classList.remove('open');
            }
        });

        function showAlert(message, type = 'success') {
            const container = document.getElementById('alert-container');
            const alert = document.createElement('div');
            const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', info: 'fa-info-circle' };
            alert.className = `alert alert-${type} show`;
            alert.innerHTML = `<i class="fas ${icons[type] || icons.info}" style="color:${type==='success'?'#27ae60':type==='error'?'#e74c3c':'#3498db'}"></i> ${message}`;
            container.appendChild(alert);
            setTimeout(() => alert.remove(), 5000);
        }

        function setTodayDate(id) {
            const el = document.getElementById(id);
            if (el) el.value = new Date().toISOString().split('T')[0];
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
